name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check app/

      - name: Format check with ruff
        run: ruff format --check app/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports || echo "mypy reported issues (non-blocking)"

      - name: Run tests
        run: pytest tests/ -v --tb=short --durations=10 --cov=app --cov-report=term --cov-fail-under=50
        env:
          DATABASE_URL: "sqlite:///./test.db"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Type check
        working-directory: frontend
        run: npx tsc -b

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
