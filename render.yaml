services:
  - type: web
    name: ethicalsiteinspector-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUDIT_MODE
        value: auto
      - key: USE_REAL_BROWSER
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: ethicalsiteinspector-db
          property: connectionString
  - type: static_site
    name: ethicalsiteinspector-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ethicalsiteinspector-api.onrender.com

databases:
  - name: ethicalsiteinspector-db
    plan: free
